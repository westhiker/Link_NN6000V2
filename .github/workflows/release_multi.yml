name: Go_Release_Multi

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 */3 * *'

env:
  DEVICES: "link_nn6000v2_immwrt zn_m2_immwrt"
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  BUILD_DIR: action_build
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build System Setup
        run: |
          df -h

          sudo apt-get purge -y \
            dotnet* ghc* libboost* android* swift* chromium* chrome* \
            firefox* ffmpeg* powershell* codeql* microsoft* || true

          sudo apt-get autoremove -y --purge
          sudo docker system prune -a -f 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/*

          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'

          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo rm -rf /var/lib/apt/lists/*

          df -h

      - name: Set Build Date
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"
          echo "BUILD_SRC=${{ env.REPO_URL }}" >> "$GITHUB_ENV"

      - name: Clone Source Code
        run: |
          chmod +x ./nn6000v2/scripts/*.sh

          git clone --depth 1 -b "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" "./${{ env.BUILD_DIR }}"

          cd "./${{ env.BUILD_DIR }}"
          git rev-parse HEAD > ../repo_flag
          cd ..

          PROJECT_MIRRORS_FILE="./${{ env.BUILD_DIR }}/scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Restore Cache
        uses: actions/cache/restore@v5.0.4
        with:
          path: |
            ./${{ env.BUILD_DIR }}/dl
            ./${{ env.BUILD_DIR }}/.ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('repo_flag') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: Build Firmware
        run: |
          ./nn6000v2/scripts/build_multi.sh $DEVICES

          FIRST_MANIFEST=$(find ./firmware -name "immortalwrt-*.manifest" | head -1)
          if [ -n "$FIRST_MANIFEST" ]; then
            KVER=$(grep "^kernel " "$FIRST_MANIFEST" | grep -oE "[4-6]\.[0-9]+\.[0-9]+" | head -1 || true)
            echo "KVER=${KVER:-unknown}" >> "$GITHUB_ENV"
          else
            echo "KVER=unknown" >> "$GITHUB_ENV"
          fi

      - name: Save Cache
        uses: actions/cache/save@v5.0.4
        with:
          path: |
            ./${{ env.BUILD_DIR }}/dl
            ./${{ env.BUILD_DIR }}/.ccache
          key: ${{ runner.os }}-openwrt-${{ hashFiles('repo_flag') }}

      - name: Machine Information
        run: |
          lscpu | grep -E "name|Core|Thread" || true
          df -h

      - name: Prepare Release Body
        run: |
          {
            echo "## 版本信息"
            echo "- 源码：${{ env.BUILD_SRC }}"
            echo "- Kernel: ${{ env.KVER }}"
            echo "- WIFI 密码：12345678"
            echo "- LAN 地址：10.0.0.1"
            echo "- 账户：root"
            echo "- 密码：无"
          } > release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_DATE }}_multi
          name: ${{ env.BUILD_DATE }} multi-device
          files: |
            ./firmware/**/*.bin
            ./firmware/**/*.manifest
            ./firmware/**/*.img.gz
            ./firmware/**/*.itb
            ./firmware/**/*.fip
            ./firmware/**/*.ubi
            ./firmware/**/*rootfs.tar.gz
          body_path: ./release_body.txt
          make_latest: true

      - name: Cleanup Old Versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[2:] | .[].tagName' || true)
          if [ -n "$RELEASES" ]; then
            echo "$RELEASES" | while read -r tag; do
              [ -n "$tag" ] && gh release delete "$tag" --cleanup-tag --yes 2>/dev/null || true
            done
          fi

          gh run list --workflow release_multi.yml --json databaseId,createdAt --jq 'sort_by(.createdAt) | reverse | .[2:] | .[].databaseId' | while read -r run_id; do
            [ -n "$run_id" ] && gh run delete "$run_id" 2>/dev/null || true
          done
